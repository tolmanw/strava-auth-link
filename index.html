<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strava OAuth Code</title>
<style>
body { font-family: Arial; background: #0d1117; color: #e6edf3; text-align: center; padding: 30px; }
pre { background: #21262d; padding: 15px; border-radius: 8px; display: inline-block; margin-top: 20px; }
</style>
</head>
<body>
<h1>Strava Authorization Code</h1>
<p>If you were redirected here, copy the code from below:</p>
<pre id="code">Waiting for code...</pre>
  
<script>
// Get the "code" parameter from URL
const params = new URLSearchParams(window.location.search);
if(params.has('code')){
    const code = params.get('code');
    document.getElementById('code').textContent = code;
} else {
    document.getElementById('code').textContent = 'No code found in URL.';
}
</script>
</body>
</html>
